name: CI Pipeline

on:
  push:
    branches: [ main, feat/hello-ci ]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: ./apps/promptlab/backend
        run: npm install

      - name: Ejecutar Tests
        working-directory: ./apps/promptlab/backend
        run: npm test