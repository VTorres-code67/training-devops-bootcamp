name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/promptlab/backend/package-lock.json

      - name: Install dependencies
        working-directory: ./apps/promptlab/backend
        run: npm ci
      
      - name: Create data directory
        run: mkdir -p data
        working-directory: ./apps/promptlab/backend

      - name: Run tests
        working-directory: ./apps/promptlab/backend
        run: npm test
        env:
          DB_PATH: ./data/promptlab.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm run lint
        working-directory: ./apps/promptlab/backend

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - run: echo "Tests y Lint pasaron, listo para build"